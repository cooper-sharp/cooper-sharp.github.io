<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos | Cooper J. Sharp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1a1a1a;
            --color-accent: #10b981;
            --color-text: #374151;
            --color-text-light: #6b7280;
            --color-bg: #ffffff;
            --color-surface: #f9fafb;
            --color-border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.7;
        }

        a {
            color: var(--color-accent);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        a:hover {
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-in {
            opacity: 0;
            animation: fadeUp 0.6s ease-out forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
        }

        nav .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--color-primary);
            letter-spacing: -0.01em;
        }

        nav .logo a {
            color: inherit;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav ul li a {
            color: var(--color-text-light);
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: var(--color-primary);
            opacity: 1;
        }

        /* Main Content */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 8rem 2rem 6rem;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--color-primary);
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .page-header p {
            color: var(--color-text-light);
            font-size: 1.05rem;
        }

        /* Location Section */
        .location-section {
            margin-bottom: 4rem;
        }

        .location-header {
            margin-bottom: 1rem;
        }

        .location-header h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--color-primary);
            margin-bottom: 0.25rem;
        }

        .location-header .year {
            font-size: 0.9rem;
            color: var(--color-text-light);
        }

        /* Carousel */
        .carousel-container {
            position: relative;
        }

        .carousel {
            display: flex;
            overflow: hidden;
            border-radius: 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease-out;
        }

        .carousel-slide {
            min-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .carousel-slide img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .carousel-slide img:hover {
            transform: scale(1.01);
        }

        /* Carousel Controls */
        .carousel-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .carousel-btn {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--color-text-light);
        }

        .carousel-btn:hover:not(:disabled) {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .carousel-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .carousel-btn svg {
            width: 18px;
            height: 18px;
        }

        .carousel-dots {
            display: flex;
            gap: 0.5rem;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-border);
            border: none;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .carousel-dot:hover {
            background: var(--color-text-light);
        }

        .carousel-dot.active {
            background: var(--color-accent);
            transform: scale(1.2);
        }

        /* Photo counter */
        .photo-counter {
            font-size: 0.85rem;
            color: var(--color-text-light);
            min-width: 60px;
            text-align: center;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            cursor: zoom-out;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-light);
            font-size: 0.85rem;
            border-top: 1px solid var(--color-border);
        }

        /* Responsive */
        @media (max-width: 640px) {
            main {
                padding: 7rem 1.5rem 4rem;
            }

            nav .container {
                padding: 1rem 1.5rem;
            }

            nav ul {
                gap: 1.25rem;
            }

            .page-header h1 {
                font-size: 1.8rem;
            }

            .carousel-slide img {
                max-height: 350px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="index.html">Cooper J. Sharp</a></div>
            <ul>
                <li><a href="index.html#research">Research</a></li>
                <li><a href="resume.html">CV</a></li>
                <li><a href="photos.html" class="active">Photos</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="page-header animate-in delay-1">
            <h1>Photos</h1>
            <p>A few places I've been!</p>
        </div>

        <!-- Location 1: Maine -->
        <section class="location-section animate-in delay-2" data-carousel="Maine">
            <div class="location-header">
                <h2>Maine, USA</h2>
                <span class="year">2023</span>
            </div>
            <div class="carousel-container">
                <div class="carousel">
                    <div class="carousel-track" data-track="Maine">
                        <div class="carousel-slide">
                            <img src="photos/maine/photo1.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                        <div class="carousel-slide">
                            <img src="photos/maine/photo2.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                        <div class="carousel-slide">
                            <img src="photos/maine/photo3.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                            <div class="carousel-slide">
                            <img src="photos/maine/photo4.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                        <div class="carousel-slide">
                            <img src="photos/maine/photo5.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                        <div class="carousel-slide">
                            <img src="photos/maine/photo6.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                            <div class="carousel-slide">
                            <img src="photos/maine/photo7.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                        <div class="carousel-slide">
                            <img src="photos/maine/photo8.jpg" alt="Maine" onclick="openLightbox(this.src)">
                        </div>
                    </div>
                </div>
                <div class="carousel-controls">
                    <button class="carousel-btn" data-prev="Maine" onclick="moveCarousel('Maine', -1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <div class="carousel-dots" data-dots="Maine"></div>
                    <button class="carousel-btn" data-next="Maine" onclick="moveCarousel('Maine', 1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Location 2: Las Vegas -->
        <section class="location-section animate-in delay-3" data-carousel="lasvegas">
            <div class="location-header">
                <h2>Las Vegas, Nevada</h2>
                <span class="year">2025</span>
            </div>
            <div class="carousel-container">
                <div class="carousel">
                    <div class="carousel-track" data-track="lasvegas">
                        <div class="carousel-slide">
                            <img src="photos/vegas/photo1.png" alt="Las Vegas" onclick="openLightbox(this.src)">
                        </div>
                        <div class="carousel-slide">
                            <img src="photos/vegas/photo2.png" alt="Las Vegas" onclick="openLightbox(this.src)">
                        </div>
                            <div class="carousel-slide">
                            <img src="photos/vegas/photo3.jpeg" alt="Las Vegas" onclick="openLightbox(this.src)">
                        </div>
                            <div class="carousel-slide">
                            <img src="photos/vegas/photo4.jpeg" alt="Las Vegas" onclick="openLightbox(this.src)">
                        </div>
                    </div>
                </div>
                <div class="carousel-controls">
                    <button class="carousel-btn" data-prev="lasvegas" onclick="moveCarousel('lasvegas', -1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <div class="carousel-dots" data-dots="lasvegas"></div>
                    <button class="carousel-btn" data-next="lasvegas" onclick="moveCarousel('lasvegas', 1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

<!-- Location 3: Dolly Sods -->
        <section class="location-section animate-in delay-3" data-carousel="dollysods">
            <div class="location-header">
                <h2>Dolly Sods, West Virginia</h2>
                <span class="year">2021</span>
            </div>
            <div class="carousel-container">
                <div class="carousel">
                    <div class="carousel-track" data-track="dollysods">
                        <div class="carousel-slide">
                            <img src="photos/dollysods/photo1.jpeg" alt="Dolly Sods" onclick="openLightbox(this.src)">
                        </div>
                        <div class="carousel-slide">
                            <img src="photos/dollysods/photo2.jpeg" alt="Dolly Sods" onclick="openLightbox(this.src)">
                        </div>
                    </div>
                </div>
                <div class="carousel-controls">
                    <button class="carousel-btn" data-prev="dollysods" onclick="moveCarousel('dollysods', -1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <div class="carousel-dots" data-dots="dollysods"></div>
                    <button class="carousel-btn" data-next="dollysods" onclick="moveCarousel('dollysods', 1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2025 Cooper J. Sharp</p>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <img id="lightboxImg" src="" alt="Full size image">
    </div>

    <script>
        // Carousel state for each location
        const carouselState = {};

        // Initialize all carousels
        document.querySelectorAll('[data-carousel]').forEach(section => {
            const id = section.dataset.carousel;
            const track = document.querySelector(`[data-track="${id}"]`);
            const slides = track.querySelectorAll('.carousel-slide');
            const dotsContainer = document.querySelector(`[data-dots="${id}"]`);
            
            carouselState[id] = {
                currentSlide: 0,
                totalSlides: slides.length
            };

            // Create dots
            for (let i = 0; i < slides.length; i++) {
                const dot = document.createElement('button');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(id, i);
                dotsContainer.appendChild(dot);
            }

            updateCarousel(id);
        });

        function updateCarousel(id) {
            const state = carouselState[id];
            const track = document.querySelector(`[data-track="${id}"]`);
            const dotsContainer = document.querySelector(`[data-dots="${id}"]`);
            const prevBtn = document.querySelector(`[data-prev="${id}"]`);
            const nextBtn = document.querySelector(`[data-next="${id}"]`);

            track.style.transform = `translateX(-${state.currentSlide * 100}%)`;

            // Update dots
            dotsContainer.querySelectorAll('.carousel-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === state.currentSlide);
            });

            // Update buttons
            prevBtn.disabled = state.currentSlide === 0;
            nextBtn.disabled = state.currentSlide === state.totalSlides - 1;
        }

        function moveCarousel(id, direction) {
            const state = carouselState[id];
            state.currentSlide = Math.max(0, Math.min(state.currentSlide + direction, state.totalSlides - 1));
            updateCarousel(id);
        }

        function goToSlide(id, index) {
            carouselState[id].currentSlide = index;
            updateCarousel(id);
        }

        // Lightbox functionality
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
