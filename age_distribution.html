
<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }
        .card {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .card-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-group {
            display: inline-flex;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }
        .btn-group button {
            padding: 8px 20px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-group button.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="card-title">Age Distribution</div>
        <div class="btn-group">
            <button class="active" onclick="selectPopulation('all', this)">All</button>
            <button onclick="selectPopulation('adolescent', this)">Adolescent</button>
            <button onclick="selectPopulation('older', this)">Older</button>
            <button onclick="selectPopulation('general', this)">General</button>
        </div>
    </div>
    <div id="myChart"></div>
</div>
<script>
    const colors = {
        all: '#667eea',
        adolescent: '#764ba2',
        older: '#4facfe',
        general: '#f093fb'
    };
    let data = {};
    let currentPopulation = 'all';

    fetch('visualizations/age_data.json')
        .then(response => response.json())
        .then(loadedData => {
            data = loadedData;
            updateChart();
        });

    function selectPopulation(population, button) {
        document.querySelectorAll('.btn-group button').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        currentPopulation = population;
        updateChart();
    }

    function updateChart() {
        const trace = {
            x: data[currentPopulation],
            type: 'histogram',
            nbinsx: 20,
            marker: { color: colors[currentPopulation], line: { color: 'white', width: 0.5 } },
            opacity: 0.9
        };
        const layout = {
            xaxis: { title: 'Age', gridcolor: 'rgba(0,0,0,0.05)' },
            yaxis: { title: 'Count', gridcolor: 'rgba(0,0,0,0.05)' },
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            margin: { l: 60, r: 30, t: 20, b: 50 }
        };
        Plotly.react('myChart', [trace], layout, { responsive: true, displayModeBar: false });
    }
</script>
</body>
</html>
