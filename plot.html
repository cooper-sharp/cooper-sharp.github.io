<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
        }

        /* Custom button-style selector */
        .btn-group {
            display: inline-flex;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }

        .btn-group button {
            padding: 8px 20px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-group button:hover:not(.active) {
            color: #667eea;
        }

        #myChart {
            border-radius: 12px;
            overflow: hidden;
        }

        /* Stats badges */
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: slideIn 0.5s ease-out; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <div class="card-header">
            <div class="card-title">Age Distribution Analysis</div>
            <div class="filter-group">
                <span class="filter-label">Study Population:</span>
                <div class="btn-group">
                    <button class="active" onclick="selectPopulation('all', this)">All</button>
                    <button onclick="selectPopulation('adolescent', this)">Adolescent</button>
                    <button onclick="selectPopulation('older', this)">Older Adult</button>
                    <button onclick="selectPopulation('general', this)">General</button>
                </div>
            </div>
        </div>
        
        <div id="myChart"></div>
        
        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="stat-n">-</div>
                <div class="stat-label">Participants</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-mean">-</div>
                <div class="stat-label">Mean Age</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-median">-</div>
                <div class="stat-label">Median Age</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-range">-</div>
                <div class="stat-label">Age Range</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Your data
    const data = {
        all: [/* ages */],
        adolescent: [/* ages */],
        older: [/* ages */],
        general: [/* ages */]
    };

    const colors = {
        all: '#667eea',
        adolescent: '#764ba2',
        older: '#4facfe',
        general: '#f093fb'
    };

    let currentPopulation = 'all';

    function selectPopulation(population, button) {
        // Update button states
        document.querySelectorAll('.btn-group button').forEach(btn => {
            btn.classList.remove('active');
        });
        button.classList.add('active');
        
        currentPopulation = population;
        updateChart();
        updateStats();
    }

    function updateChart() {
        const ages = data[currentPopulation];
        
        const trace = {
            x: ages,
            type: 'histogram',
            nbinsx: 20,
            marker: {
                color: colors[currentPopulation],
                line: { color: 'white', width: 0.5 }
            },
            opacity: 0.9,
            hovertemplate: '<b>Age:</b> %{x}<br><b>Count:</b> %{y}<extra></extra>'
        };

        const layout = {
            xaxis: {
                title: { text: 'Age', font: { size: 14, color: '#555' } },
                gridcolor: 'rgba(0,0,0,0.05)',
                showline: false,
                zeroline: false
            },
            yaxis: {
                title: { text: 'Frequency', font: { size: 14, color: '#555' } },
                gridcolor: 'rgba(0,0,0,0.05)',
                showline: false,
                zeroline: false
            },
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            margin: { l: 60, r: 30, t: 20, b: 50 },
            hovermode: 'x',
            transition: { duration: 300, easing: 'cubic-in-out' }
        };

        const config = {
            responsive: true,
            displayModeBar: false
        };

        Plotly.react('myChart', [trace], layout, config);
    }

    function updateStats() {
        const ages = data[currentPopulation];
        const n = ages.length;
        const mean = (ages.reduce((a, b) => a + b, 0) / n).toFixed(1);
        const sorted = [...ages].sort((a, b) => a - b);
        const median = sorted[Math.floor(n / 2)];
        const range = `${sorted[0]}-${sorted[sorted.length - 1]}`;
        
        document.getElementById('stat-n').textContent = n.toLocaleString();
        document.getElementById('stat-mean').textContent = mean;
        document.getElementById('stat-median').textContent = median;
        document.getElementById('stat-range').textContent = range;
    }

    // Initialize
    updateChart();
    updateStats();
</script>

</body>
</html>
